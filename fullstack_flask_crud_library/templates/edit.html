<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>
</head>
<body>
    <h1>Edit Book</h1>
    <form action="/edit/{{ book.id }}" method="POST">
        <label for="book_name">Title:</label>
        <input type="text" id="book_name" name="book_name" value="{{ book.title }}" required><br><br>

        <label for="book_author">Author:</label>
        <input type="text" id="book_author" name="book_author" value="{{ book.author }}" required><br><br>

        <label for="rating">Rating:</label>
        <input type="float" id="rating" name="rating" value="{{ book.rating }}" min="0" max="10" step="0.1" required><br><br>

        <button type="submit">Update</button>
    </form>
    <a href="{{ url_for('home') }}">Cancel</a>
</body>
</html>
