<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
  </head>
  <body>
    <h1>My Library</h1>
    {% if books %}
    <ul>
      {% for book in books %}
      <li>
        <strong>{{ book.title }}</strong>
        by {{ book.author }} (Rating: {{ book.rating }})
        <a href="{{ url_for('edit', book_id=book.id) }}">Edit</a>
        <form
          action="{{ url_for('delete', book_id=book.id) }}"
          method="POST"
          style="display: inline"
        >
          <button type="submit">Delete</button>
        </form>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>No books in your library yet. Add some!</p>
    {% endif %}
    <a href="{{ url_for('add') }}">Add New Book</a>
  </body>
</html>
